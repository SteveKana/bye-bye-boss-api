<!doctype html>
<html lang="{{ locale }}">
  <body style="margin:0;padding:0;background:#F8F7FF;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#111827">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F8F7FF;padding:32px 16px">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#FFFFFF;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden">
            <tr>
              <td style="padding:24px 28px 0">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="background:#5B3FE8;border-radius:9px;width:34px;height:34px;text-align:center;color:#FFFFFF;font-weight:900;font-size:13px">BB</td>
                    <td style="padding-left:10px;font-weight:700;font-size:17px;color:#1A1A3E">{{ brand }}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 28px 28px;font-size:15px;line-height:1.65;color:#4B5563">
                {% block content %}{% endblock %}
              </td>
            </tr>
          </table>

          <div style="max-width:520px;margin-top:16px;font-size:12px;line-height:1.6;color:#9CA3AF;text-align:center">
            {% block footer %}
            {{ brand }} — vous recevez cet email car vous vous êtes inscrit à la liste d'attente.
            {% endblock %}
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>

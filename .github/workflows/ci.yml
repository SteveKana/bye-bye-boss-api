name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: '3.12'

jobs:
  validate:
    name: Lint, types, import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      # Advisory: 12 pre-existing errors, several are SQLModel/SQLAlchemy
      # typing mismatches on AsyncSession.exec. Flip to blocking once cleared.
      - name: Mypy
        run: mypy app
        continue-on-error: true

      - name: Import application
        run: python -c "from app.main import app; assert app.routes"

  staging:
    name: Deploy api-dev.byebyeboss.fr
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://api-dev.byebyeboss.fr
    steps:
      - name: Trigger deployment
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.DEPLOY_KEY_STAGING }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes deploy@46.62.246.17 "$GITHUB_SHA"
        env:
          GITHUB_SHA: ${{ github.sha }}

  production:
    name: Deploy api.byebyeboss.fr
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.byebyeboss.fr
    steps:
      - name: Trigger deployment
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.DEPLOY_KEY_PRODUCTION }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes deploy@46.62.246.17 "$GITHUB_SHA"
        env:
          GITHUB_SHA: ${{ github.sha }}
